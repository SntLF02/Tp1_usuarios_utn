<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Usuarios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lista-box">
    <h2>Usuarios UTN</h2>
    <input type="text" id="buscar" placeholder="Buscar usuario">
    <button id="btnBuscar">Buscar</button>
    <table id="tablaUsuarios">
      <thead>
        <tr>
          <th>ID</th><th>Usuario</th><th>Apellido</th><th>Nombre</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="app.js"></script>
</body>

</html>
